# SafePost Supabase Configuration
# Project ref: acvcwzaipsxyrwbxithc (Sydney region)
#
# All Edge Functions use verify_jwt = false because authentication
# is handled within each function via Supabase client auth headers.
# This is the single source of truth for JWT settings — the deploy
# workflow flags (--no-verify-jwt) should match these entries.

[functions.analyze-post]
verify_jwt = false

